<div class="modal-bg" id="create-book-box" style="visibility: collapse;">
    <div class="modal">
        <!htmpy loading !>
        <h2>Create Book</h2>
        <form id="create-book-form" method="post">
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="image-box">
                        <img src="images/upload_image.svg" alt="uploading_image" id="create-book-cover"/>
                    </div>
                    <button type="button" class="upload-button" id="create-upload-cover-button">Upload Cover</button>
                    <div class="validation-error cover-validation-error"></div>
                    <input type="file" name="cover" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="form-group">
                        <label>Title</label>
                        <input type="text" name="title"/>
                        <div class="validation-error title-validation-error"></div>
                    </div>
                    <div class="form-group">
                        <label>Link</label>
                        <input type="text" name="link"/>
                        <div class="validation-error link-validation-error"></div>
                    </div>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Create" class="button create-save-button"/>
                <button type="button" class="button outline-button cancel-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
