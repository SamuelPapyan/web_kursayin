<div class="modal-bg" id="create-example-box" style="visibility: collapse;">
    <div class="modal">
        <!htmpy loading !>
        <h2>Create Example</h2>
        <form id="create-example-form" method="post">
            <div class="long-form-group">
                <label>Name</label>
                <input type="text" name="name"/>
            </div>
            <div class="validation-error title-validation-error" field="name"></div>
            <div class="form-row">
                <div class="code-column">
                    <div class="form-group">
                        <label>HTML Code</label>
                        <textarea class="htmlCode" name="htmlCode"></textarea>
                        <div class="validation-error title-validation-error" field="htmlCode"></div>
                    </div>
                    <div class="form-group">
                        <label>CSS Code</label>
                        <textarea class="cssCode" name="cssCode"></textarea>
                        <div class="validation-error title-validation-error" field="cssCode"></div>
                    </div>
                </div>
                <div class="code-result">
                    <h3>Result</h3>
                    <div class="code-iframe">
                        <iframe id="result"></iframe>
                    </div>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Create" class="button create-save-button"/>
                <button type="button" class="button outline-button cancel-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
