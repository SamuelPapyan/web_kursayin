<div class="modal-bg" id="create-test-box" style="visibility: collapse;">
    <div class="modal">
        <!htmpy loading !>
        <h2>Create Test</h2>
        <form id="create-test-form" method="post">
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="image-box">
                        <img src="images/upload_image.svg" alt="uploading_image" id="create-test-image"/>
                    </div>
                    <button type="button" class="upload-button" id="create-upload-image-button">Upload Photo</button>
                    <div class="validation-error photo-validation-error" field="image"></div>
                    <input type="file" name="image" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="form-group">
                        <label>Test Title</label>
                        <input type="text" name="title"/>
                        <div class="validation-error title-validation-error" field="title"></div>
                    </div>
                    <div class="form-group">
                        <label>Theme Link</label>
                        <input type="text" name="themeLink"/>
                        <div class="validation-error themeLink-validation-error" field="themeLink"></div>
                    </div>
                    <div class="form-group">
                        <label>Variants</label>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="0"/>
                            <textarea name="variants" placeholder="Answer 1"></textarea>
                        </div>
                        <div class="validation-error vairants[0]-validation-error" field="variants[0]"></div>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="1"/>
                            <textarea name="variants" placeholder="Answer 2"></textarea>
                        </div>
                        <div class="validation-error variants[1]-validation-error" field="variants[1]"></div>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="2"/>
                            <textarea name="variants" placeholder="Answer 3"></textarea>
                        </div>
                        <div class="validation-error variants[2]-validation-error" field="variants[2]"></div>
                    </div>
                    <div class="validation-error answer-validation-error" field="answer"></div>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Create" class="button create-save-button"/>
                <button type="button" class="button outline-button cancel-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
