<div class="modal-bg" id="create-video-box" style="visibility: hidden;">
    <div class="modal">
        <h2>Create Video</h2>
        <form id="create-video-form" method="post">
            <div class="long-form-group">
                <label>Name</label>
                <input type="text" name="name"/>
            </div>
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="image-box">
                        <img src="#" alt="uploading_image"/>
                    </div>
                    <button type="button" class="upload-button" id="upload-video-button">Upload Video</button>
                    <input type="file" name="cover" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="table-form">
                        <table class="time-description-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Description</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr rowId="1">
                                    <td class="time-input">
                                        <input type="text" name="time"/>
                                    </td>
                                    <td class="description-input">
                                        <textarea name="description"></textarea>
                                    </td>
                                    <td>
                                        <button type="button" class="remove-button">-</button>
                                    </td>
                                </tr>
                                <tr rowId="2">
                                    <td class="time-input">
                                        <input type="text" name="time"/>
                                    </td>
                                    <td class="description-input">
                                    <textarea name="description"></textarea>
                                    </td>
                                    <td class="remove-input">
                                        <button type="button" class="remove-button">-</button>
                                    </td>
                                </tr>
                                <tr rowId="3">
                                    <td class="time-input">
                                        <input type="text" name="time"/>
                                    </td>
                                    <td class="description-input">
                                        <textarea name="description"></textarea>
                                    </td>
                                    <td>
                                        <button type="button" class="remove-button">-</button>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <button type="button" class="create-button button" id="create-add-time-desc">+ Add</button>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Create" class="button edit-button"/>
                <button type="button" class="button outline-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
