<div class="modal-bg" id="edit-student-box" style="visibility: collapse;">
    <div class="modal">
        <h2>Edit Student</h2>
        <form id="edit-student-form" method="post">
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="image-box">
                        <img src="#" alt="uploading_image"/>
                    </div>
                    <button type="button" class="upload-button" id="upload-avatar-button">Upload Avatar</button>
                    <input type="file" name="avatar" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" name="username"/>
                    </div>
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" name="fullName"/>
                    </div>
                    <div class="form-group">
                        <label>Email</label>
                        <input type="text" name="email"/>
                    </div>
                    <div class="form-group">
                        <label>Password</label>
                        <input type="password" name="password"/>
                    </div>
                    <div class="form-group">
                        <label>Phone</label>
                        <input type="text" name="phone"/>
                    </div>
                    <div class="form-group">
                        <label>Birth Date</label>
                        <input type="date" name="birthDate"/>
                    </div>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Save" class="button edit-button"/>
                <button type="button" class="button outline-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
