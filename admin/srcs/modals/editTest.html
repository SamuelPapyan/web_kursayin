<div class="modal-bg" id="edit-test-box" style="visibility: collapse;">
    <div class="modal">
        <h2>Edit Test</h2>
        <form id="edit-test-form" method="post">
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="image-box">
                        <img src="#" alt="uploading_image"/>
                    </div>
                    <button type="button" class="upload-button" id="upload-photo-button">Upload Photo</button>
                    <input type="file" name="avatar" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="form-group">
                        <label>Test Title</label>
                        <input type="text" name="title"/>
                    </div>
                    <div class="form-group">
                        <label>Theme Link</label>
                        <input type="text" name="themeLink"/>
                    </div>
                    <div class="form-group">
                        <label>Variants</label>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="0"/>
                            <textarea name="variants[0]" placeholder="Answer 1"></textarea>
                        </div>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="1"/>
                            <textarea name="variants[1]" placeholder="Answer 2"></textarea>
                        </div>
                        <div class="variant-box">
                            <input type="radio" name="answer" value="2"/>
                            <textarea name="variants[2]" placeholder="Answer 3"></textarea>
                        </div>
                    </div>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Create" class="button edit-button"/>
                <button type="button" class="button outline-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
