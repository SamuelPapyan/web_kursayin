<div class="modal-bg" id="edit-video-box" style="visibility: hidden;">
    <div class="modal">
        <!htmpy loading !>
        <h2>Edit Video</h2>
        <form id="edit-video-form" method="post">
            <div class="long-form-group">
                <label>Title</label>
                <input type="text" name="title"/>
            </div>
            <div class="form-row">
                <div class="image-upload-form">
                    <div class="video-box">
                        <video id="edit-video-preview" autoplay controls></video>
                    </div>
                    <button type="button" class="upload-button" id="edit-upload-video-button">Upload Video</button>
                    <input type="file" name="videoFile" style="visibility:collapse;"/>
                </div>
                <div class="form-fields">
                    <div class="table-form">
                        <table class="time-description-table">
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Description</th>
                                    <th></th>
                                </tr>
                            </thead>
                            <tbody>
                               
                            </tbody>
                        </table>
                    </div>
                    <button type="button" class="add-time-item-button button" id="edit-add-time-desc">+ Add</button>
                </div>
            </div>
            <div class="action-controls">
                <input type="submit" value="Save" class="button create-save-button"/>
                <button type="button" class="button outline-button cancel-button">Cancel</button>
            </div>
        </form>
    </div>
</div>
